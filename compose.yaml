# ============================================================================
# AAPel — Docker Compose base
# ============================================================================
# Defines services common to dev and prod. Apply overrides via:
#
#   make dev        →  -f compose.yaml -f compose.dev.yaml
#   make prod-up    →  -f compose.yaml -f compose.prod.yaml
#
# Env vars are interpolated from `.env` (dev) or from secrets sourced by
# scripts/deploy.sh (prod). See ARCHITECTURE.md §12.
# ============================================================================

name: aapel

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aapel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-aapel}
      # Speed up text search on the catalog
      LANG: C.UTF-8
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aapel} -d ${POSTGRES_DB:-aapel}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aapel}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-aapel}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_EXPIRE_MINUTES: ${JWT_ACCESS_EXPIRE_MINUTES:-15}
      JWT_REFRESH_EXPIRE_DAYS: ${JWT_REFRESH_EXPIRE_DAYS:-7}
      ANALYTICS_PEPPER: ${ANALYTICS_PEPPER:?ANALYTICS_PEPPER required}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      DEBUG: ${DEBUG:-false}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health',timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # One-off migrations runner. Activated via:
  #   docker compose --profile migrate run --rm migrate
  migrate:
    profiles: ["migrate"]
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aapel}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-aapel}
    restart: "no"

volumes:
  pgdata:
    name: aapel_pgdata
